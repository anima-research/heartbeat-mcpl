name: Build & Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # mcpl-harness is not published to npm; test/reminders.harness.mjs loads
      # HostSession from a sibling checkout (../mcpl-harness). Clone it and
      # install its runtime deps so `npm test` can drive the e2e harness.
      - name: Checkout mcpl-harness (e2e test harness)
        run: |
          git clone --depth 1 https://github.com/anima-research/mcpl-harness.git ../mcpl-harness
          npm install --prefix ../mcpl-harness --omit=dev --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    # OIDC trusted publishing: GitHub mints a short-lived id-token, npm CLI
    # exchanges it for a publish credential. No long-lived NPM_TOKEN secret.
    # npm-side config: npmjs.com -> package -> Settings -> Trusted Publishers
    # -> GitHub Actions, matching the repo + this workflow path.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # node 24 ships npm >= 11.5.1, required for OIDC publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public --provenance
